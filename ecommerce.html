    <h5 class="card-title">Dijual</h5>
    <p class="card-text">Some quick example text to build on the card title and make up the bulk of the card’s content.</p>
    <h3 style="color: lightskyblue;">Rp. 18.000</h3>
    <button onclick="hai()" class="btn btn-primary">Beli</a>
  </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script>
  let saldo = 50000;
  let harga = 18000;
  function hai() {
    let konfirmasi = confirm("apakah anda ingin membeli ini");
    if (konfirmasi=== true) {
       if(saldo >=harga) {
        saldo -= harga;
        alert("Berhasil! Sisa saldo anda: Rp. " + saldo.toLocaleString());
      } else {
        alert("Saldo anda tidak cukup");
      }

    } else {
      alert("Anda membatalkan pembayaran");
    }
  }
</script>
