<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=E, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let nama_toko = "bukuya";
        document.write("nama toko : " + nama_toko);
        document.write("<br>");

        let harga_sewa = 5000;
        document.write("harga sewa : " + harga_sewa);
        document.write("<br>");

        let lama_sewa = 6;
        document.write("lama sewa : " + lama_sewa + " jam");
        document.write("<br>");

        let total_bayar = harga_sewa * lama_sewa;
        document.write("total bayar : " + total_bayar);
        document.write("<br>");

        let uang = 100000;
        document.write("uang :" + uang);
        document.write("<br>");

        let sisa_uang = uang - total_bayar;
        document.write("sisa uang : " + sisa_uang);

    </script>
</body>

</html>
